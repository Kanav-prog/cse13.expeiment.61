<!DOCTYPE html>
<html>
<head>
<title>Digital Clock</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:black;
}
.clock{
font-size:70px;
font-family:monospace;
color:#00ff00;
border:3px solid #00ff00;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #00ff00;
}
</style>
</head>
<body>

<div class="clock">
12:45:36
</div>

</body>
</html>
