<!DOCTYPE html>
<html>
<head>
 <title>Temperature Converter</title>
</head>
<body style="font-family:Arial; background:#fce4ec; padding:20px;">
 <div style="max-width:400px; margin:auto; background:white; padding:20px; borderradius:10px;">
 <h2 style="text-align:center;">Temperature Converter</h2>
 <input type="number" id="celsius" placeholder="Enter Celsius" style="width:100%;
padding:10px;">
 <button onclick="convertTemp()" style="width:100%; margin-top:10px; padding:10px;
background:#c2185b; color:white; border:none;">Convert</button>
 <p id="result" style="text-align:center; font-size:18px;"></p>
 </div>
 <script>
 function convertTemp() {
 let c = parseFloat(document.getElementById("celsius").value);
 let f = (c * 9/5) + 32;
 document.getElementById("result").innerText = "Fahrenheit = " + f;
 }
 </script>
</body>
</html>
